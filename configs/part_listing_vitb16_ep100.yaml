data:
  batch_size: 64
  color_jitter_strength: 0.0
  crop_scale:
  - 0.3
  - 1.0
  crop_size: 224
  image_folder: train/
  num_workers: 8
  pin_mem: true
  root_path: $replace_this_with_absolute_path_to_partimagenet
  use_color_distortion: false
  use_gaussian_blur: false
  use_horizontal_flip: true
  # Part-listing specific
  annotation_file: null  # path to PartImageNet COCO-style annotations JSON

logging:
  folder: $replace_this_with_path_for_experiment_logs/part_listing_vitb16.224-bs.512-ep.100/
  write_tag: part-listing-jepa

mask:
  allow_overlap: false
  aspect_ratio:
  - 0.75
  - 1.5
  enc_mask_scale:
  - 0.85
  - 1.0
  min_keep: 10
  num_enc_masks: 1
  num_pred_masks: 4
  patch_size: 16
  pred_mask_scale:
  - 0.15
  - 0.2

meta:
  copy_data: false
  load_checkpoint: false
  model_name: vit_base
  pred_depth: 6
  pred_emb_dim: 384
  read_checkpoint: null
  use_bfloat16: true
  # Part-listing specific
  use_part_listing: true
  text_encoder_type: clip
  clip_model_name: openai/clip-vit-base-patch16
  num_cross_attn_blocks: 2
  use_slot_attention: true
  num_slots: 8
  slot_iters: 3
  slot_loss_weight: 0.1
  diversity_loss_weight: 0.05

optimization:
  ema:
  - 0.996
  - 1.0
  epochs: 100
  final_lr: 1.0e-06
  final_weight_decay: 0.4
  ipe_scale: 1.0
  lr: 0.001
  start_lr: 0.0002
  warmup: 10
  weight_decay: 0.04
